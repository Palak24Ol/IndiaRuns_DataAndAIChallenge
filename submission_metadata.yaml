# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini and Claude for architectural discussion and code review.
  All design decisions — feature weights, keyword taxonomies, scoring
  formulas, honeypot detection rules — were made by the team based on
  hands-on audits of the actual candidate dataset. Pipeline architecture,
  feature engineering, and scoring logic were built and iterated by us;
  AI tools were used as a sounding board, not as the author. No candidate
  data was sent to any external LLM during ranking. The ranking pipeline
  is fully deterministic and uses zero ML model inference at runtime.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage retrieval-and-ranking pipeline processing 100K candidates in
  7.5 seconds on CPU. Stage 1 filters by title + career-description gates
  (100K → 2,755). Stage 2 flags 253 honeypots via salary/domain/career
  inconsistency rules. Stage 3 extracts 42 features across 9 groups:
  career description keyword density (retrieval, production, ML, leadership),
  skill depth (proficiency × duration × endorsements), title relevance,
  experience fit, company quality tiers, location/logistics, education,
  behavioral signals, and assessment scores. Stage 4 applies coarse scoring
  with a multiplicative behavioral modifier (0.50x–1.15x) to select Top 200.
  Stage 5 precision-reranks with description-heavy weights (retrieval 25%,
  production 15%) to select Top 100. Stage 6 calibrates Top 10 using
  ultra-specific retrieval keywords and availability signals. Every reasoning
  string is deterministic, zero-hallucination, extracted directly from
  candidate JSON fields. No ML frameworks or external APIs at runtime.

